version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: display_office_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: display_user
      POSTGRES_PASSWORD: display_password_secreta
      POSTGRES_DB: display_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - display_network

  # 2. Backend (Node.js API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: display_office_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://display_user:display_password_secreta@db:5432/display_db?schema=public
      - JWT_SECRET=${JWT_SECRET:-mude_isso_em_producao_super_secreto}
      - PORT=3001
      # Configure aqui a URL do seu frontend (ex: https://display.seudominio.com)
      - CORS_ORIGINS=*
    depends_on:
      - db
    networks:
      - display_network
    # Roda as migrations do Prisma antes de subir o servidor
    command: >
      sh -c "npx prisma migrate deploy && npm start"

  # 3. Frontend (React + Vite servido pelo Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ATENÇÃO: Mude esta variável para a URL pública onde sua API (backend) estará disponível
        # Como você usa Cloudflare, provavelmente será algo como https://api.seudominio.com/api
        - VITE_API_URL=http://localhost:3001/api
    container_name: display_office_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - display_network

networks:
  display_network:
    driver: bridge

volumes:
  pgdata:
