version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: display_user
      POSTGRES_PASSWORD: display_password_secreta
      POSTGRES_DB: display_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - display_network

  # 2. Backend (Node.js API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3005:3001"
    environment:
      - DATABASE_URL=postgresql://display_user:display_password_secreta@db:5432/display_db?schema=public
      - JWT_SECRET=${JWT_SECRET:-mude_isso_em_producao_super_secreto}
      - PORT=3001
      # Configure aqui a URL do seu frontend (ex: https://display.seudominio.com)
      - CORS_ORIGINS=*
    depends_on:
      - db
    volumes:
      - uploads_data:/app/uploads
    networks:
      - display_network
    # Cria/atualiza tabelas no banco + cria admin + inicia o servidor
    command: >
      sh -c "npx prisma db push --skip-generate && node prisma/seed-prod.js && npm start"

  # 3. Frontend (React + Vite servido pelo Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Usamos rota relativa /api para que o NGINX faça o proxy reverso
        - VITE_API_URL=/api
    restart: unless-stopped
    ports:
      - "8095:80"
    networks:
      - display_network

  # 4. pgAdmin — Interface visual para o banco de dados
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: abnersantos2025@admin.com
      PGADMIN_DEFAULT_PASSWORD: A@b.26%19abner
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - display_network

networks:
  display_network:
    driver: bridge

volumes:
  pgdata:
  pgadmin_data:
  uploads_data:
