
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Officecom Display</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #020617; /* Slate 950 */
      color: #f8fafc;
      overflow-x: hidden;
    }
    /* Hide scrollbars for player mode */
    .kiosk-mode {
      overflow: hidden !important;
      cursor: none;
    }
    .kiosk-mode ::-webkit-scrollbar {
      display: none;
    }
    /* Custom Scrollbar for Dashboard/Editor */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; 
    }
    ::-webkit-scrollbar-thumb {
      background: #334155; 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569; 
    }

    /* React Grid Layout Essential Styles */
    .react-grid-layout {
      position: relative;
      transition: height 200ms ease;
    }
    .react-grid-item {
      transition: all 200ms ease;
      transition-property: left, top;
      touch-action: none;
    }
    .react-grid-item.resizing {
      z-index: 1000;
      will-change: width, height;
    }
    .react-grid-item.react-draggable-dragging {
      transition: none;
      z-index: 1000;
      will-change: left, top;
    }
    .react-grid-item.react-grid-placeholder {
      background: rgba(34, 211, 238, 0.1) !important; /* Cyan glow */
      border: 1px dashed rgba(34, 211, 238, 0.5) !important;
      border-radius: 8px !important;
      opacity: 0.8 !important;
      transition-duration: 100ms !important;
      z-index: 2 !important;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    
    /* Custom Resize Handle Styles */
    .react-grid-item > .react-resizable-handle {
      position: absolute;
      z-index: 50;
    }
    .react-grid-item > .react-resizable-handle::after {
      content: "";
      position: absolute;
      border-color: #22d3ee; /* Neon Cyan */
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .react-grid-item:hover > .react-resizable-handle::after,
    .react-grid-item.resizing > .react-resizable-handle::after {
      opacity: 1;
    }

    /* SE Handle (Default/Corner) */
    .react-resizable-handle-se {
      bottom: 0;
      right: 0;
      cursor: se-resize;
      width: 20px;
      height: 20px;
    }
    .react-resizable-handle-se::after {
      bottom: 4px;
      right: 4px;
      width: 12px;
      height: 12px;
      border-right: 3px solid #22d3ee;
      border-bottom: 3px solid #22d3ee;
      border-radius: 2px;
      box-shadow: 0 0 10px #22d3ee;
    }

    /* SW Handle */
    .react-resizable-handle-sw {
      bottom: 0;
      left: 0;
      cursor: sw-resize;
      width: 20px;
      height: 20px;
    }
    .react-resizable-handle-sw::after {
      bottom: 4px;
      left: 4px;
      width: 12px;
      height: 12px;
      border-left: 3px solid #22d3ee;
      border-bottom: 3px solid #22d3ee;
      border-radius: 2px;
    }

    /* NE Handle */
    .react-resizable-handle-ne {
      top: 0;
      right: 0;
      cursor: ne-resize;
      width: 20px;
      height: 20px;
    }
    .react-resizable-handle-ne::after {
      top: 4px;
      right: 4px;
      width: 12px;
      height: 12px;
      border-right: 3px solid #22d3ee;
      border-top: 3px solid #22d3ee;
      border-radius: 2px;
    }

    /* NW Handle */
    .react-resizable-handle-nw {
      top: 0;
      left: 0;
      cursor: nw-resize;
      width: 20px;
      height: 20px;
    }
    .react-resizable-handle-nw::after {
      top: 4px;
      left: 4px;
      width: 12px;
      height: 12px;
      border-left: 3px solid #22d3ee;
      border-top: 3px solid #22d3ee;
      border-radius: 2px;
    }

    /* N Handle */
    .react-resizable-handle-n {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      cursor: n-resize;
      width: 40px;
      height: 10px;
    }
    .react-resizable-handle-n::after {
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 4px;
      border-top: 3px solid #22d3ee;
      border-radius: 2px;
    }

    /* S Handle */
    .react-resizable-handle-s {
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      cursor: s-resize;
      width: 40px;
      height: 10px;
    }
    .react-resizable-handle-s::after {
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 4px;
      border-bottom: 3px solid #22d3ee;
      border-radius: 2px;
    }

    /* E Handle */
    .react-resizable-handle-e {
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      cursor: e-resize;
      width: 10px;
      height: 40px;
    }
    .react-resizable-handle-e::after {
      right: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 20px;
      border-right: 3px solid #22d3ee;
      border-radius: 2px;
    }

    /* W Handle */
    .react-resizable-handle-w {
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      cursor: w-resize;
      width: 10px;
      height: 40px;
    }
    .react-resizable-handle-w::after {
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 20px;
      border-left: 3px solid #22d3ee;
      border-radius: 2px;
    }
  </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
